window_title: "羊了个羊：星球"

grid:
  # 比例值 (0.0~1.0)，自动乘以截图宽高转为像素
  origin_x: 0.0
  origin_y: 0.0
  cell_width: 0.0547
  cell_height: 0.0954
  cols: 10
  rows: 16

recognition:
  confidence_threshold: 0.45
  dark_threshold: 80  # 灰度低于此值视为数字像素，其余过滤掉

solver:
  search_depth: 5
  beam_width: 15
  n_simulations: 500
  time_budget: 30

executor:
  animation_delay: 0.1
  inward_shrink: 5

hotkeys:
  pause: "F10"
  quit: "F12"
