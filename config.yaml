window_title: "羊了个羊：星球"

grid:
  origin_x: 0
  origin_y: 0
  cell_width: 50
  cell_height: 50
  cols: 10
  rows: 16

recognition:
  confidence_threshold: 0.7
  empty_variance_threshold: 500
  crop_ratio: 0.5  # 只用格子中心50%区域识别数字，忽略包子轮廓

solver:
  search_depth: 3
  beam_width: 15

executor:
  animation_delay: 0.3
  inward_shrink: 5

hotkeys:
  pause: "F10"
  quit: "F12"
